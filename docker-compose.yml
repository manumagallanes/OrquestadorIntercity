services:
  orchestrator:
    build: .
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    command:
      - uvicorn
      - orchestrator.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  scheduler:
    build: .
    env_file:
      - ../.env
    environment:
      - ORCHESTRATOR_BASE_URL=http://orchestrator:8000
      - POLL_INTERVAL=600 # 10 minutos
      - RETRY_INTERVAL=1800 # 30 minutos
      - REFRESH_INTERVAL=21600 # 6 horas
    volumes:
      - scheduler-state:/app/.state
    command:
      - bash
      - /app/scripts/scheduler.sh
    depends_on:
      - orchestrator
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    depends_on:
      - orchestrator

  grafana:
    image: grafana/grafana:10.4.3
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=simpod-json-datasource
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

  ui:
    build: .
    command:
      - streamlit
      - run
      - ui/app.py
      - --server.port
      - "8501"
      - --server.address
      - 0.0.0.0
    environment:
      - ORCHESTRATOR_BASE_URL=http://orchestrator:8000
    ports:
      - "8501:8501"
    depends_on:
      - orchestrator

volumes:
  grafana-data:
  scheduler-state:
