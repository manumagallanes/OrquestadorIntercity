 groups:
   - name: orchestrator-runtime
     rules:
       - alert: OrchestratorIncidentsOpen
         expr: orchestrator_incidents_buffer_size > 0
         for: 15m
         labels:
           severity: warning
         annotations:
           summary: "Incidentes abiertos en el orquestador"
           description: "El buffer del orquestador tiene incidentes sin resolver por más de 15 minutos."
       - alert: OrchestratorSmartOLTErrors
         expr: increase(orchestrator_integration_errors_total{service="smartolt"}[5m]) > 0
         for: 5m
         labels:
           severity: critical
         annotations:
           summary: "Fallas recurrentes al integrar con SmartOLT"
           description: "Se detectaron errores al llamar a SmartOLT durante los últimos 5 minutos."
